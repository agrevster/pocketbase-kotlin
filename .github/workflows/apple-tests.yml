name: run-apple-tests
on: workflow_dispatch

jobs:
  test:
    runs-on: macOS-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v2
      - name: Install JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3
      - name: Cache gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Cache konan
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-gradle-${{ hashFiles('*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Download Pocketbase
        run: curl "https://github.com/pocketbase/pocketbase/releases/download/v${{env.POCKETBASE_VERSION}}/pocketbase_${{env.POCKETBASE_VERSION}}_darwin_arm64.zip" -L -o pocketbase.zip

      - name: Extract Pocketbase
        run: unzip ./pocketbase.zip

      - name: Create test superuser
        run: ./pocketbase superuser create admin@test.com password

      - name: Start pocketbase for tests
        run: ./pocketbase serve &

      - name: Run tests
        run: ./gradlew appleTests --no-daemon --stacktrace --info

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx3g"
  POCKETBASE_VERSION: 0.36.8
